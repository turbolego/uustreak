<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 98 Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop" aria-label="Windows 98 desktop">
        <div class="desktop-icons" aria-label="Desktop icons">
            <button class="icon" type="button" data-app="uustreak">📊<span>Uustreak</span></button>
            <button class="icon" type="button" data-app="github">🌐<span>GitHub</span></button>
            <button class="icon" type="button" data-app="readme">📄<span>README</span></button>
            <button class="icon" type="button" data-app="computer">💽<span>My Computer</span></button>
        </div>

        <section class="window active" id="main-window" aria-labelledby="window-title" role="dialog" aria-modal="false">
            <div class="titlebar" data-drag-handle>
                <span id="window-title">My Computer</span>
                <div class="window-controls">
                    <button type="button" data-window-action="minimize">_</button>
                    <button type="button" data-window-action="close">✕</button>
                </div>
            </div>
            <div class="content" id="window-content">
                <div class="explorer-shell">
                    <aside class="tree-pane" aria-label="Folder tree">
                        <div class="tree-header">Folders</div>
                        <button type="button" class="tree-item active" data-folder="root">Uustreak CD</button>
                        <button type="button" class="tree-item" data-folder="app">Application</button>
                        <button type="button" class="tree-item" data-folder="docs">Documents</button>
                        <button type="button" class="tree-item" data-folder="assets">Assets</button>
                    </aside>
                    <div class="file-pane" aria-label="File list">
                        <div class="file-grid" id="file-grid"></div>
                    </div>
                </div>
            </div>
        </section>

        <nav class="start-menu" id="start-menu" aria-label="Start menu">
            <button type="button" data-app="uustreak">🚀 Run Uustreak</button>
            <button type="button" data-app="github">📦 GitHub Repo</button>
            <button type="button" data-app="readme">📄 Open README</button>
            <button type="button" data-app="computer">💽 My Computer</button>
            <button type="button" data-action="restart">🔄 Restart CD</button>
        </nav>

        <div class="taskbar">
            <button class="start-button" type="button" id="start-button">Start</button>
            <button class="task-button active" type="button" data-app="computer">My Computer</button>
            <div class="clock" id="clock" aria-label="Current time"></div>
        </div>
    </div>

    <template id="file-template">
        <button type="button" class="file-item">
            <span class="file-icon"></span>
            <span class="file-name"></span>
        </button>
    </template>

    <script src="os.js"></script>
</body>
</html>
