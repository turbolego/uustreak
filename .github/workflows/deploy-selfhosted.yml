# Self-hosted accessibility testing workflow with comprehensive failure handling
# This workflow has 4 critical jobs that must ALL succeed:
# 1. setup: Generates test matrix and validates URLs
# 2. wcag-test: Runs accessibility tests on all URLs
# 3. merge-summaries: Consolidates test results
# 4. deploy: Uploads results to web server
#
# Failure handling:
# - If ANY job fails, the workflow terminates and retries (max 3 attempts)
# - All jobs must complete successfully before proceeding to deployment
# - Exponential backoff between retry attempts (5min, 10min, 15min)
# - Final failure results in workflow termination with notification

name: Deploy to Self-hosted
on:
  schedule:
    - cron: '0 0 * * *'          # every day at 00:00 UTC
  workflow_dispatch:   # Allows manual execution
    inputs:
      retry_count:
        description: 'Retry attempt number (internal use)'
        required: false
        default: '1'
        type: string

concurrency:
  group: wcag-testing-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel running tests

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
  issues: write

defaults:
  run:
    shell: bash

jobs:
  setup:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      cache-path: ${{ steps.cache-output.outputs.cache-path }}
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Log workflow attempt
        run: |
          RETRY_COUNT=${{ github.event.inputs.retry_count || '1' }}
          echo "🚀 Starting WCAG Accessibility Testing workflow - Attempt $RETRY_COUNT"
          if [[ $RETRY_COUNT -gt 1 ]]; then
            echo "This is a retry attempt due to previous failures."
          fi

      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git for authentication
        run: |
          git config --global credential.helper ""
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Playwright browser directory
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/ms-playwright-setup
          key: ${{ runner.os }}-playwright-setup-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-setup-

      - name: Install dependencies and Playwright browsers
        id: cache-output
        timeout-minutes: 25
        run: |
          echo "Completely removing npm cache for setup..."

          # Force removal of all npm-related directories and files
          rm -rf ~/.npm ~/.cache/npm ~/.config/npm /tmp/npm-* 2>/dev/null || echo "Cleaned npm directories"

          # Also clean any npm processes that might be holding locks
          pkill -u "$(whoami)" -f npm 2>/dev/null || echo "No npm processes to kill or pkill not available on this platform"

          # Wait a moment for filesystem to settle
          sleep 2

          # Create completely fresh npm environment
          export NPM_CONFIG_CACHE=/tmp/npm-cache-$(date +%s)
          export NPM_CONFIG_PREFIX=/tmp/npm-prefix-$(date +%s)
          mkdir -p "$NPM_CONFIG_CACHE" "$NPM_CONFIG_PREFIX"

          # Configure npm to use GitHub token for authentication
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "@github:registry=https://npm.pkg.github.com" >> ~/.npmrc

          # Set npm to use temporary directories and disable cache
          npm config set cache "$NPM_CONFIG_CACHE"
          npm config set prefix "$NPM_CONFIG_PREFIX"
          npm config set registry https://registry.npmjs.org/
          npm config set fund false
          npm config set audit false

          # Retry logic for deterministic npm installation
          MAX_RETRIES=3
          RETRY_DELAY=5
          INSTALL_OK=false
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i: Installing dependencies with npm ci..."
            if npm ci --no-fund --no-audit --prefer-offline=false --cache="$NPM_CONFIG_CACHE"; then
              INSTALL_OK=true
              break
            fi
            echo "Attempt $i failed. Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          done

          if [ "$INSTALL_OK" != "true" ]; then
            echo "❌ npm ci failed after $MAX_RETRIES attempts"
            exit 1
          fi

          echo "Cleaning Playwright browser cache before install..."
          rm -rf "$HOME/.cache/ms-playwright" "$HOME/Library/Caches/ms-playwright" 2>/dev/null || true

          # Isolate setup browser cache path to avoid contention with matrix jobs
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/ms-playwright-setup"
          mkdir -p "$PLAYWRIGHT_BROWSERS_PATH"
          export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1

          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Playwright browser cache restored; skipping download."
          else
            echo "Starting Playwright browser install..."
            (
              while true; do
                echo "⏳ Playwright install heartbeat: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                sleep 30
              done
            ) &
            HEARTBEAT_PID=$!

            cleanup_heartbeat() {
              kill "$HEARTBEAT_PID" 2>/dev/null || true
            }
            trap cleanup_heartbeat EXIT

            npx playwright install chromium firefox webkit

            cleanup_heartbeat
            trap - EXIT
          fi

          echo "Verifying installed browsers in setup cache..."
          find "$PLAYWRIGHT_BROWSERS_PATH" -maxdepth 2 -type d \( -name "chromium*" -o -name "firefox*" -o -name "webkit*" \) | sort || true

          echo "Creating Playwright browser bundle artifact..."
          PLAYWRIGHT_BUNDLE="$RUNNER_TEMP/playwright-browsers-${RUNNER_OS}.tar.gz"
          tar -C "$PLAYWRIGHT_BROWSERS_PATH" -czf "$PLAYWRIGHT_BUNDLE" .
          ls -lh "$PLAYWRIGHT_BUNDLE"
          echo "cache-path=$(pwd)" >> $GITHUB_ENV

      - name: Upload Playwright browser bundle
        uses: actions/upload-artifact@v7
        with:
          name: playwright-browsers
          path: ${{ runner.temp }}/playwright-browsers-*.tar.gz
          retention-days: 1

      - name: Ensure Python and venv are available
        run: |
          # Check if python3 or python is available (cross-platform)
          PYTHON_CMD=$(command -v python3 2>/dev/null || command -v python 2>/dev/null)
          if [ -z "$PYTHON_CMD" ]; then
            echo "Error: Python not found. Please ensure Python is installed on the runner."
            exit 1
          fi
          echo "Found Python: $PYTHON_CMD ($($PYTHON_CMD --version 2>&1))"
          if ! $PYTHON_CMD -m venv --help >/dev/null 2>&1; then
            echo "Warning: Python venv module not available. Please ensure python3-venv is installed on the runner."
            echo "Linux installation command: sudo apt-get install -y python3-venv"
            exit 1
          else
            echo "Python and venv module are available"
          fi

      - name: Set up Python virtual environment
        run: |
          # Cross-platform: use python3 or python depending on what's available
          PYTHON_CMD=$(command -v python3 2>/dev/null || command -v python 2>/dev/null)
          $PYTHON_CMD -m venv venv
          # Cross-platform venv activation (Linux/macOS: bin/activate, Windows: Scripts/activate)
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
          else
            source venv/Scripts/activate
          fi
          pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Verify projects.json exists
        run: |
          # Verify that projects.json exists
          if [ ! -f "projects.json" ]; then
            echo "Error: projects.json file not found!"
            exit 1
          fi
          echo "Found projects.json with $(jq length projects.json) projects"
          if [ -d "historical-data/invalid-urls" ]; then
            mkdir -p invalid-urls-artifacts
            cp historical-data/invalid-urls/invalid_urls_*.json invalid-urls-artifacts/ 2>/dev/null || echo "No invalid URLs files found"
          fi

      - name: Generate spec files
        run: |
          # Cross-platform venv activation
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
          else
            source venv/Scripts/activate
          fi
          # Cross-platform python invocation
          (python3 generate_specs.py 2>/dev/null || python generate_specs.py)
          cp js/tag-summary.js tests/

      - name: Ensure jq is available
        run: |
          # Check if jq is available
          if ! command -v jq >/dev/null 2>&1; then
            echo "Warning: jq is not available. Please ensure jq is installed on the runner."
            echo "Manual installation command: sudo apt-get install -y jq"
            exit 1
          else
            echo "jq is available"
          fi

      - name: Generate test distribution
        id: set-matrix
        run: |
          SPECS=(tests/*.spec.ts)
          TOTAL_SPECS=${#SPECS[@]}
          TARGET_TESTS_PER_BATCH=5
          BATCH_COUNT=$(( (TOTAL_SPECS + TARGET_TESTS_PER_BATCH - 1) / TARGET_TESTS_PER_BATCH ))

          # Tests are network-I/O bound (waiting for site responses) so we can run
          # more parallel jobs than CPU-bound work would allow. Use cores 1:1, cap at 6.
          # Cross-platform CPU core detection (Linux: nproc, macOS: sysctl, Windows: NUMBER_OF_PROCESSORS env var)
          AVAILABLE_CORES=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "${NUMBER_OF_PROCESSORS:-4}")
          MAX_PARALLEL=$((AVAILABLE_CORES))
          if [ "$MAX_PARALLEL" -gt 6 ]; then
            MAX_PARALLEL=6
          elif [ "$MAX_PARALLEL" -lt 1 ]; then
            MAX_PARALLEL=1
          fi

          if [ "$BATCH_COUNT" -gt "$MAX_PARALLEL" ]; then
            BATCH_COUNT=$MAX_PARALLEL
          fi

          BATCH_SIZE=$(( (TOTAL_SPECS + BATCH_COUNT - 1) / BATCH_COUNT ))

          # Generate matrix as array of batch indices: ["0", "1", "2", ...]
          BATCHES=$(seq 0 $((BATCH_COUNT - 1)) | jq -R . | jq -sc '.')
          echo "matrix={\"batch\":$BATCHES}" >> $GITHUB_OUTPUT
          echo "Total specs: $TOTAL_SPECS"
          echo "Batch count: $BATCH_COUNT"
          echo "Batch size: $BATCH_SIZE"
          echo "Max parallel jobs will be: $BATCH_COUNT"
          echo "Tests per batch: approximately $TARGET_TESTS_PER_BATCH"

      - name: Upload test files
        uses: actions/upload-artifact@v7
        with:
          name: test-spec-files
          path: tests/
          retention-days: 1

      - name: Upload invalid URLs files
        uses: actions/upload-artifact@v7
        with:
          name: invalid-urls-files
          path: invalid-urls-artifacts/
          retention-days: 30
          if-no-files-found: ignore
        continue-on-error: true

      - name: Validate setup outputs
        run: |
          echo "Validating setup job outputs..."
          MATRIX_OUTPUT='${{ steps.set-matrix.outputs.matrix }}'
          
          if [[ -z "$MATRIX_OUTPUT" || "$MATRIX_OUTPUT" == "null" ]]; then
            echo "❌ ERROR: Matrix output is empty or null"
            echo "Matrix output: $MATRIX_OUTPUT"
            exit 1
          fi
          
          # Check if matrix is valid JSON
          echo "$MATRIX_OUTPUT" | jq . > /dev/null
          if [[ $? -ne 0 ]]; then
            echo "❌ ERROR: Matrix output is not valid JSON"
            echo "Matrix output: $MATRIX_OUTPUT"
            exit 1
          fi
          
          echo "✅ Setup validation successful"
          echo "Matrix: $MATRIX_OUTPUT"

  wcag-test:
    needs: setup
    runs-on: self-hosted
    timeout-minutes: 600
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: true  # Stop all jobs if one fails
      max-parallel: 6
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
          clean: true

      - name: Download test files
        uses: actions/download-artifact@v8
        with:
          name: test-spec-files
          path: tests/

      - uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Verify project structure
        run: |
          echo "=== Project Structure Check ==="
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo ""
          echo "package.json exists: $([ -f package.json ] && echo "YES" || echo "NO")"
          if [ -f package.json ]; then
            echo "package.json content:"
            cat package.json
          fi
          echo ""
          echo "Node and npm versions:"
          node --version
          npm --version
          echo ""
          echo "Current npm configuration:"
          npm config list

      - name: Debug system resources
        continue-on-error: true
        timeout-minutes: 2
        run: |
          echo "=== System Resources Before npm install ==="
          echo "Memory info:"
          free -h 2>/dev/null || echo "Memory info not available"
          echo ""
          echo "CPU info:"
          CORES=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "${NUMBER_OF_PROCESSORS:-unknown}")
          echo "CPU cores: $CORES"
          uptime 2>/dev/null || echo "Load average not available"
          echo ""
          echo "Running processes:"
          ps aux | grep -E '(npm|node)' | grep -v grep || echo "No npm/node processes running"

      - name: Install dependencies
        env:
          NODE_OPTIONS: "--max_old_space_size=2048"
        run: |
          echo "=== Starting npm installation ==="
          
          # Clean npm cache and configuration first
          npm cache clean --force || echo "Cache clean failed, continuing..."
          
          # Set npm configuration for reliable installation
          npm config set fund false
          npm config set audit false
          npm config set progress false
          npm config set loglevel error
          npm config set registry https://registry.npmjs.org/
          
          MAX_RETRIES=3
          RETRY_DELAY=5
          INSTALL_OK=false
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i: npm ci..."
            if npm ci --no-fund --no-audit --prefer-offline=false; then
              INSTALL_OK=true
              break
            fi
            echo "Attempt $i failed. Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          done

          if [ "$INSTALL_OK" != "true" ]; then
            echo "❌ npm ci failed after $MAX_RETRIES attempts"
            echo "Checking npm logs..."
            cat ~/.npm/_logs/*debug*.log 2>/dev/null | tail -20 || echo "No npm logs found"
            exit 1
          fi
          
          echo "=== npm installation completed ==="
          echo "Verifying installation..."
          npm list --depth=0 || echo "Some dependencies may be missing but continuing..."

      - name: Download Playwright browser bundle
        uses: actions/download-artifact@v8
        with:
          name: playwright-browsers
          path: ${{ runner.temp }}/playwright-browsers-artifact

      - name: Restore Playwright browsers
        run: |
          echo "Restoring Playwright browsers from setup artifact..."
          echo "Runner: ${RUNNER_NAME:-unknown} (${RUNNER_OS:-unknown})"
          BUNDLE_DIR="${RUNNER_TEMP:-/tmp}/playwright-browsers-artifact"
          TARBALL=$(find "$BUNDLE_DIR" -maxdepth 1 -name 'playwright-browsers-*.tar.gz' | head -n 1)
          if [ -z "$TARBALL" ]; then
            echo "❌ Playwright browser bundle not found in $BUNDLE_DIR"
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi

          PLAYWRIGHT_DIR="${RUNNER_TEMP:-/tmp}/ms-playwright-restored-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT:-1}-batch-${{ matrix.batch }}"
          rm -rf "$PLAYWRIGHT_DIR" 2>/dev/null || true
          mkdir -p "$PLAYWRIGHT_DIR"
          tar -xzf "$TARBALL" -C "$PLAYWRIGHT_DIR"

          export PLAYWRIGHT_BROWSERS_PATH="$PLAYWRIGHT_DIR"
          export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1
          echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_DIR" >> $GITHUB_ENV

          echo "Restored Playwright browsers path: $PLAYWRIGHT_DIR"
          ls -la "$PLAYWRIGHT_DIR" || echo "Playwright browser directory listing failed"

          # Self-heal if restored bundle does not contain the browsers used by our navigation strategies.
          if ! find "$PLAYWRIGHT_DIR" -maxdepth 3 -type d \( -name "chromium*" -o -name "firefox*" -o -name "webkit*" \) | grep -q .; then
            echo "⚠️ Restored bundle missing browser binaries. Installing missing browser binaries..."
            export PLAYWRIGHT_BROWSERS_PATH="$PLAYWRIGHT_DIR"
            export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1

            npx playwright install chromium firefox webkit
          fi

          echo "Final browser binaries present:"
          find "$PLAYWRIGHT_DIR" -maxdepth 3 -type d \( -name "chromium*" -o -name "firefox*" -o -name "webkit*" \) | sort || true

      - name: Run WCAG Accessibility Tests for batch ${{ matrix.batch }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          BATCH_INDEX: ${{ matrix.batch }}
          PREFER_HASH_URL: "true"
        run: |
          # Reuse Playwright browser path restored from setup artifact
          export PLAYWRIGHT_BROWSERS_PATH="${PLAYWRIGHT_BROWSERS_PATH:-${RUNNER_TEMP:-/tmp}/ms-playwright-restored-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT:-1}-batch-${{ matrix.batch }}}"
          export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1
          
          echo "=== Starting WCAG tests for batch ${{ matrix.batch }} ==="
          
          # Verify test files exist
          if [ ! -d "tests" ] || [ -z "$(ls -A tests/ 2>/dev/null)" ]; then
            echo "❌ No test files found in tests/ directory"
            ls -la tests/ || echo "tests/ directory does not exist"
            exit 1
          fi
          
          # Bash 3.2 compatible array population (macOS default bash doesn't support mapfile)
          ALL_SPECS=()
          while IFS= read -r -d '' file; do
            ALL_SPECS+=("$file")
          done < <(find tests -maxdepth 1 -name "*.spec.ts" -print0 | sort -z)
          TOTAL_SPECS=${#ALL_SPECS[@]}

          echo "Found $TOTAL_SPECS test specification files"
          echo "Matrix batch: ${{ matrix.batch }}"

          TARGET_TESTS_PER_BATCH=5
          BATCH_COUNT=$(( (TOTAL_SPECS + TARGET_TESTS_PER_BATCH - 1) / TARGET_TESTS_PER_BATCH ))

          # Cross-platform CPU core detection (Linux: nproc, macOS: sysctl, Windows: NUMBER_OF_PROCESSORS env var)
          AVAILABLE_CORES=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "${NUMBER_OF_PROCESSORS:-4}")
          MAX_PARALLEL=$((AVAILABLE_CORES))
          if [ "$MAX_PARALLEL" -gt 6 ]; then
            MAX_PARALLEL=6
          elif [ "$MAX_PARALLEL" -lt 1 ]; then
            MAX_PARALLEL=1
          fi

          if [ "$BATCH_COUNT" -gt "$MAX_PARALLEL" ]; then
            BATCH_COUNT=$MAX_PARALLEL
          fi

          # Round-robin assignment: batch N processes tests at indices N, N+BATCH_COUNT, N+2*BATCH_COUNT...
          # This distributes alphabetically-clustered (same-org) slow sites across all batches
          # rather than piling them into consecutive sequential blocks.
          BATCH_IDX=${{ matrix.batch }}
          echo "Processing batch $BATCH_IDX (round-robin stride=$BATCH_COUNT, total batches=$BATCH_COUNT)"
          echo "Approx tests per batch: $(( (TOTAL_SPECS + BATCH_COUNT - 1) / BATCH_COUNT )), Total batches: $BATCH_COUNT"
          
          # Create output directories
          mkdir -p accessibility-reports playwright-report
          
          TESTS_RUN=0
          TESTS_FAILED=0
          
          # Count tests assigned to this batch (round-robin stride)
          BATCH_TEST_COUNT=0
          for ((i = BATCH_IDX; i < ${#ALL_SPECS[@]}; i += BATCH_COUNT)); do
            if [ -f "${ALL_SPECS[$i]}" ]; then
              BATCH_TEST_COUNT=$((BATCH_TEST_COUNT + 1))
            fi
          done
          
          echo "📊 Batch ${{ matrix.batch }} will process $BATCH_TEST_COUNT tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for ((i = BATCH_IDX; i < ${#ALL_SPECS[@]}; i += BATCH_COUNT)); do
            if [ -f "${ALL_SPECS[$i]}" ]; then
              SPEC_FILE="${ALL_SPECS[$i]}"
              PROJECT_NAME=$(basename "$SPEC_FILE" .spec.ts | tr '_' ' ')
              
              TESTS_RUN=$((TESTS_RUN + 1))
              TESTS_REMAINING=$((BATCH_TEST_COUNT - TESTS_RUN))
              
              # Create progress bar
              PROGRESS_PERCENT=$(( (TESTS_RUN * 100) / BATCH_TEST_COUNT ))
              PROGRESS_BARS=$(( PROGRESS_PERCENT / 2 ))  # 50 chars max width
              PROGRESS_BAR=""
              for ((j=0; j<PROGRESS_BARS; j++)); do PROGRESS_BAR+="█"; done
              for ((j=PROGRESS_BARS; j<50; j++)); do PROGRESS_BAR+="░"; done
              
              echo ""
              echo "🧪 [$TESTS_RUN/$BATCH_TEST_COUNT] Running tests for '$PROJECT_NAME'"
              echo "📁 File: $SPEC_FILE"
              echo "📊 Batch ${{ matrix.batch }} Progress: [$PROGRESS_BAR] $PROGRESS_PERCENT% ($TESTS_REMAINING tests remaining)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              # Record start time for this test
              TEST_START_TIME=$(date +%s)
              
              if npx playwright test "$SPEC_FILE"; then
                TEST_END_TIME=$(date +%s)
                TEST_DURATION=$((TEST_END_TIME - TEST_START_TIME))
                echo "✅ [$TESTS_RUN/$BATCH_TEST_COUNT] Tests completed successfully for $PROJECT_NAME (${TEST_DURATION}s)"
              else
                TEST_END_TIME=$(date +%s)
                TEST_DURATION=$((TEST_END_TIME - TEST_START_TIME))
                echo "⚠️  [$TESTS_RUN/$BATCH_TEST_COUNT] Tests completed with issues for $PROJECT_NAME (${TEST_DURATION}s)"
                echo "    This is expected for accessibility violations"
                TESTS_FAILED=$((TESTS_FAILED + 1))
              fi
              
              # Show updated progress after completion
              PROGRESS_PERCENT=$(( (TESTS_RUN * 100) / BATCH_TEST_COUNT ))
              TESTS_REMAINING=$((BATCH_TEST_COUNT - TESTS_RUN))
              echo "📈 Batch ${{ matrix.batch }} Status: $TESTS_RUN completed, $TESTS_REMAINING remaining ($PROGRESS_PERCENT% done)"
              
              if [ $TESTS_REMAINING -gt 0 ]; then
                echo "⏳ Next: $(basename "${ALL_SPECS[$((i + BATCH_COUNT))]}" .spec.ts 2>/dev/null | tr '_' ' ' || echo "No more tests")"
              else
                echo "🎉 All tests in batch ${{ matrix.batch }} completed!"
              fi
              echo ""
            fi
          done
          
          echo ""
          echo "=== Batch ${{ matrix.batch }} Summary ==="
          echo "Tests run: $TESTS_RUN"
          echo "Tests with issues: $TESTS_FAILED"
          echo "Output files generated:"
          find accessibility-reports -name "*.json" 2>/dev/null | wc -l | xargs echo "  Accessibility reports:"
          find playwright-report -name "*.html" 2>/dev/null | wc -l | xargs echo "  Playwright reports:"
        continue-on-error: true

      - name: Upload test results
        if: always()
        run: |
          BATCH_DIR=test-results-batch-${{ matrix.batch }}
          mkdir -p "$BATCH_DIR"
          
          # Always ensure the report subdirectories exist inside the batch directory
          mkdir -p "$BATCH_DIR/accessibility-reports"
          mkdir -p "$BATCH_DIR/playwright-report"
          
          # Copy actual reports if they exist
          if [ -d "accessibility-reports" ] && [ "$(ls -A accessibility-reports 2>/dev/null)" ]; then
            echo "Copying accessibility reports..."
            # Note: cp -r copies the source directory INTO the target
            # e.g., copies accessibility-reports/* into $BATCH_DIR/
            cp -r accessibility-reports "$BATCH_DIR/"
          else
            echo "No accessibility reports found."
          fi
          
          if [ -d "playwright-report" ] && [ "$(ls -A playwright-report 2>/dev/null)" ]; then
            echo "Copying playwright reports..."
            cp -r playwright-report "$BATCH_DIR/"
          else
            echo "No playwright reports found."
          fi

          # === START FIX: Ensure at least one file exists to prevent upload-artifact warning ===
          # The batch directory needs at least one file to avoid the 'No files were found' warning.
          # We check if the main batch directory still contains only empty folders (or nothing).
          # The -depth 1 option is key for checking top-level content
          if [ "$(find "$BATCH_DIR" -maxdepth 1 -type f | wc -l)" -eq 0 ]; then
            echo "Creating placeholder file to ensure artifact upload is not skipped..."
            echo "placeholder" > "$BATCH_DIR/placeholder.txt"
          fi
          # === END FIX ===

      - name: Upload artifacts for batch
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-batch-${{ matrix.batch }}
          path: test-results-batch-${{ matrix.batch }}/
          retention-days: 3
          if-no-files-found: ignore # Added to be extra safe

      - name: Cleanup runner workspace after tests
        if: always()
        run: |
          echo "=== Cleaning up runner workspace after batch ${{ matrix.batch }} ==="
          echo "Disk usage before cleanup:"
          df -h . || true
          rm -rf accessibility-reports playwright-report test-results-batch-${{ matrix.batch }} tests node_modules venv 2>/dev/null || true
          rm -rf "${RUNNER_TEMP:-/tmp}/ms-playwright-restored-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT:-1}-batch-${{ matrix.batch }}" 2>/dev/null || true
          rm -rf /tmp/npm-cache-* /tmp/npm-prefix-* 2>/dev/null || true
          echo "Disk usage after cleanup:"
          df -h . || true

  merge-summaries:
    needs: wcag-test
    runs-on: self-hosted
    if: success() # Only run if wcag-test succeeded
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: test-results-batch-*
          merge-multiple: true

      - name: Merge Summary Parts
        run: |
          echo "Merging summary part files..."
          
          # Get today's date
          TODAY=$(date +%Y-%m-%d)
          echo "Merging summaries for date: $TODAY"
          
          # Clean up old summaries - only upload today's merged summary
          rm -rf "accessibility-reports/summaries"
          
          # Create target directory structure
          mkdir -p "accessibility-reports/summaries/$TODAY"
          
          # Copy all part files from artifacts
          find artifacts -name "daily_summary_part_*.json" -exec cp {} "accessibility-reports/summaries/$TODAY/" \;
          
          # Debug: Show structure of artifacts directory
          echo "=== DEBUG: Artifacts directory structure ==="
          find artifacts -type f -name "*.json" | head -20 || true
          echo "=== DEBUG: Looking for summary files specifically ==="
          find artifacts -name "*summary*.json"
          
          # List found part files
          echo "Found part files:"
          ls -la "accessibility-reports/summaries/$TODAY/daily_summary_part_"*.json 2>/dev/null || echo "No part files found"
          
          # Calculate the number of parts based on the number of batches
          PARTS_COUNT=$(find artifacts -name "daily_summary_part_*.json" | wc -l)
          echo "Found $PARTS_COUNT summary parts to merge"
          
          # Run merge using the actual number of parts found
          if [ "$PARTS_COUNT" -gt 0 ]; then
            node js/merge-summary-parts.js "$TODAY" "$PARTS_COUNT"
            
            # Verify the merged file
            if [ -f "accessibility-reports/summaries/$TODAY/daily_summary.json" ]; then
              echo "✓ Successfully created merged summary file"
              echo "File size: $(wc -c < "accessibility-reports/summaries/$TODAY/daily_summary.json") bytes"
            else
              echo "✗ Failed to create merged summary file"
            fi
            
            # Clean up part files - only keep the merged summary
            rm -f "accessibility-reports/summaries/$TODAY/daily_summary_part_"*.json
          else
            echo "No summary parts found to merge"
          fi
          
      - name: Upload merged summary
        uses: actions/upload-artifact@v7
        with:
          name: merged-summary
          path: accessibility-reports/summaries/
          retention-days: 7

  check-job-status:
    needs: [setup, wcag-test, merge-summaries]
    runs-on: self-hosted
    if: always()
    outputs:
      all_jobs_successful: ${{ steps.check-status.outputs.all_successful }}
      should_retry: ${{ steps.check-status.outputs.should_retry }}
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Check if all jobs succeeded
        id: check-status
        run: |
          echo "Checking job statuses..."
          
          # Check each job result
          SETUP_STATUS="${{ needs.setup.result }}"
          WCAG_TEST_STATUS="${{ needs.wcag-test.result }}"
          MERGE_SUMMARIES_STATUS="${{ needs.merge-summaries.result }}"
          
          echo "Setup job status: $SETUP_STATUS"
          echo "WCAG test job status: $WCAG_TEST_STATUS"
          echo "Merge summaries job status: $MERGE_SUMMARIES_STATUS"
          
          # Validate setup job outputs if setup succeeded
          if [[ "$SETUP_STATUS" == "success" ]]; then
            MATRIX_OUTPUT='${{ needs.setup.outputs.matrix }}'
            if [[ -z "$MATRIX_OUTPUT" || "$MATRIX_OUTPUT" == "null" ]]; then
              echo "❌ Setup job succeeded but produced invalid matrix output"
              SETUP_STATUS="failure"
            else
              echo "✅ Setup job outputs validated"
            fi
          fi
          
          # Determine if all jobs were successful
          if [[ "$SETUP_STATUS" == "success" && "$WCAG_TEST_STATUS" == "success" && "$MERGE_SUMMARIES_STATUS" == "success" ]]; then
            echo "✅ All jobs completed successfully"
            echo "all_successful=true" >> $GITHUB_OUTPUT
            echo "should_retry=false" >> $GITHUB_OUTPUT
          else
            echo "❌ One or more jobs failed:"
            echo "  Setup: $SETUP_STATUS"
            echo "  WCAG Test: $WCAG_TEST_STATUS"
            echo "  Merge Summaries: $MERGE_SUMMARIES_STATUS"
            
            # Check retry count
            RETRY_COUNT=${{ github.event.inputs.retry_count || '1' }}
            echo "Current retry attempt: $RETRY_COUNT"
            
            # Only retry if we haven't reached the maximum attempts and at least one job actually failed
            if [[ $RETRY_COUNT -lt 3 ]] && [[ \"$SETUP_STATUS\" == \"failure\" || \"$WCAG_TEST_STATUS\" == \"failure\" || \"$MERGE_SUMMARIES_STATUS\" == \"failure\" ]]; then
              echo "Will attempt retry (attempt $RETRY_COUNT of 3)"
              echo "should_retry=true" >> $GITHUB_OUTPUT
            else
              if [[ $RETRY_COUNT -ge 3 ]]; then
                echo "Maximum retry attempts (3) reached. Workflow will terminate."
              else
                echo "Jobs were cancelled or skipped, not retrying."
              fi
              echo "should_retry=false" >> $GITHUB_OUTPUT
            fi
            
            echo "all_successful=false" >> $GITHUB_OUTPUT
          fi

  retry-workflow:
    needs: [check-job-status]
    runs-on: self-hosted
    if: needs.check-job-status.outputs.should_retry == 'true'
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Wait before retry
        run: |
          RETRY_COUNT=${{ github.event.inputs.retry_count || '1' }}
          WAIT_TIME=$((RETRY_COUNT * 300))  # Exponential backoff: 5min, 10min, 15min
          echo "Waiting $WAIT_TIME seconds before retrying the workflow (attempt $RETRY_COUNT)..."
          sleep $WAIT_TIME
          
      - name: Trigger workflow retry
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const retryCount = parseInt('${{ github.event.inputs.retry_count || '1' }}') + 1;
            console.log(`Triggering retry attempt ${retryCount}`);
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-selfhosted.yml',
              ref: 'main',
              inputs: {
                retry_count: retryCount.toString()
              }
            });
            
            console.log('Retry workflow triggered successfully');

  deploy:
    needs: [wcag-test, merge-summaries, check-job-status]
    runs-on: self-hosted
    if: needs.check-job-status.outputs.all_jobs_successful == 'true'
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Fetch gh-pages index files (sparse)
        run: |
          # Only download the small index files needed to build site-output incrementally.
          # This avoids fetching the ~90 000 historical violation JSON files (~300-600 MB).
          rm -rf gh-pages-sparse
          mkdir gh-pages-sparse
          cd gh-pages-sparse

          git init -q
          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Blobless fetch: downloads commit + tree objects only, no file content yet
          git fetch --depth=1 --filter=blob:none --no-tags -q origin gh-pages

          # Cone-mode sparse checkout: only materialise historical-data/ on disk
          git sparse-checkout init --cone
          git sparse-checkout set historical-data

          git checkout FETCH_HEAD

          # Fetch archive_index.json by triggering a single lazy blob download.
          # The archives/ directory itself is intentionally excluded to avoid the large tar.gz files.
          mkdir -p accessibility-reports/archives
          git show FETCH_HEAD:accessibility-reports/archives/archive_index.json \
            > accessibility-reports/archives/archive_index.json 2>/dev/null \
            || echo "⚠️  archive_index.json not found on gh-pages; will be created fresh"

          cd ..
          echo "✅ Sparse gh-pages fetch complete"
          echo "Files fetched: $(find gh-pages-sparse -type f | wc -l)"
          du -sh gh-pages-sparse 2>/dev/null || true

      - name: Validate gh-pages sparse seed
        run: |
          if [ ! -d "gh-pages-sparse" ]; then
            echo "❌ gh-pages-sparse directory is missing"
            exit 1
          fi

          if [ ! -f "gh-pages-sparse/historical-data/report-list.json" ]; then
            echo "❌ gh-pages-sparse is missing historical-data/report-list.json"
            echo "Refusing to continue to avoid accidental history wipe"
            exit 1
          fi

          echo "✅ gh-pages sparse seed validated"
          echo "  Files: $(find gh-pages-sparse -type f | wc -l)"
          echo "  Size:  $(du -sh gh-pages-sparse 2>/dev/null | cut -f1)"

      - name: Check disk space and pre-clean runner caches
        run: |
          echo "=== Disk usage before deploy ==="
          df -h || true
          echo "=== Pre-clean common caches ==="
          # npm caches
          rm -rf ~/.npm ~/.cache/npm /tmp/npm-cache-* /tmp/npm-prefix-* 2>/dev/null || true
          # Playwright browser cache can be very large on persistent self-hosted runners
          rm -rf "$HOME/.cache/ms-playwright" "${RUNNER_TEMP:-/tmp}/ms-playwright-*" 2>/dev/null || true
          # pip caches (macOS/Linux)
          rm -rf "$HOME/Library/Caches/pip" "$HOME/.cache/pip" 2>/dev/null || true
          # Remove stale publish worktree from prior runs (sparse seed is managed by its own step)
          rm -rf "$GITHUB_WORKSPACE/gh-pages-publish" 2>/dev/null || true
          # Homebrew caches (macOS)
          if command -v brew >/dev/null 2>&1; then
            brew cleanup -s || true
            BREW_CACHE=$(brew --cache 2>/dev/null || true)
            if [ -n "$BREW_CACHE" ]; then
              rm -rf "$BREW_CACHE" 2>/dev/null || true
            fi
          fi
          echo "=== Disk usage after pre-clean ==="
          df -h || true
          # Fail fast if less than 5 GB free (in 1 KB blocks).
          # 5 GB is the recommended minimum; deploy peaks at ~1.2 GB with sparse seed.
          # macOS can kill processes under sustained disk pressure when headroom is too small.
          FREE_KB=$(df -Pk . | awk 'NR==2 {print $4}')
          MIN_FREE_KB=$((5 * 1024 * 1024))
          if [ -n "$FREE_KB" ] && [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
            echo "❌ Less than 5 GB free on runner — aborting to avoid partial deploy."
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: test-results-batch-*
          merge-multiple: true
        continue-on-error: true

      - name: Check artifacts directory
        run: |
          echo "Checking artifacts directory..."
          if [ -d "artifacts" ]; then
            echo "Artifacts directory exists"
            ls -la artifacts/
          else
            echo "No artifacts directory found, creating empty one"
            mkdir -p artifacts
          fi

      - name: Download invalid URLs files
        uses: actions/download-artifact@v8
        with:
          name: invalid-urls-files
          path: invalid-urls-artifacts
        continue-on-error: true

      - name: Download merged summary artifacts
        uses: actions/download-artifact@v8
        with:
          name: merged-summary
          path: merged-summaries

      - name: Build Pages site from artifacts
        run: |
          node js/build-pages-site.js
        env:
          SOURCE_DIR: ${{ github.workspace }}
          GH_PAGES_SEED_DIR: ${{ github.workspace }}/gh-pages-sparse
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          MERGED_SUMMARY_DIR: ${{ github.workspace }}/merged-summaries
          INVALID_URLS_DIR: ${{ github.workspace }}/invalid-urls-artifacts
          PAGES_OUTPUT_DIR: ${{ github.workspace }}/site-output
      - name: Validate and Repair Summary Files
        run: |
          echo "Validating and repairing summary files..."
          if command -v node >/dev/null 2>&1; then
            cd site-output
            node ../js/validate-summaries.js
            echo "Summary validation completed"
          else
            echo "Node.js not available, skipping validation"
          fi
      - name: Verify built site contents
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          echo "=== Verifying files before deployment ==="
          if [ -f "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" ]; then
            ARCHIVE_SIZE=$(stat -f%z "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" 2>/dev/null || stat -c%s "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" 2>/dev/null)
            echo "✅ Archive exists: reports_${CURRENT_DATE}.tar.gz (Size: $ARCHIVE_SIZE bytes)"
            tar -tzf "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" > /dev/null 2>&1 && echo "✅ Archive integrity verified" || echo "❌ Archive corrupted!"
          else
            echo "Today's archive is not present; continuing because some runs produce placeholder-only data."
          fi
          find site-output/accessibility-reports -maxdepth 1 -type d -name "[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]" | sort || true
          ls -lh site-output/accessibility-reports/archives/*.tar.gz 2>/dev/null | tail -5 || echo "No archives found"

      - name: Pre-publish sanity gate
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const artifactsDir = path.resolve('artifacts');
          const outputDir = path.resolve('site-output');
          const reportListPath = path.join(outputDir, 'historical-data', 'report-list.json');

          function fail(message) {
            console.error(`❌ ${message}`);
            process.exit(1);
          }

          function walkFiles(dirPath) {
            if (!fs.existsSync(dirPath)) {
              return [];
            }

            const results = [];
            const stack = [dirPath];

            while (stack.length > 0) {
              const current = stack.pop();
              for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
                const fullPath = path.join(current, entry.name);
                if (entry.isDirectory()) {
                  stack.push(fullPath);
                } else {
                  results.push(fullPath);
                }
              }
            }

            return results;
          }

          function isViolationReport(filePath) {
            const name = path.basename(filePath);
            return name.startsWith('violations-') && name.endsWith('.json') && !name.includes('-FAILED.json');
          }

          if (!fs.existsSync(reportListPath)) {
            fail('site-output/historical-data/report-list.json is missing');
          }

          let reportList;
          try {
            reportList = JSON.parse(fs.readFileSync(reportListPath, 'utf8'));
          } catch (error) {
            fail(`Unable to parse report-list.json: ${error.message}`);
          }

          if (!Array.isArray(reportList) || reportList.length === 0) {
            fail('report-list.json is empty or not an array');
          }

          const artifactReports = walkFiles(artifactsDir).filter(isViolationReport);
          if (artifactReports.length === 0) {
            fail('No violations-*.json files found in artifacts; refusing to publish to avoid deleting history with empty input');
          }

          const expectedByDate = new Map();
          for (const filePath of artifactReports) {
            const fileName = path.basename(filePath);
            const match = fileName.match(/-(\d{4}-\d{2}-\d{2})T/);
            if (!match) {
              continue;
            }
            const date = match[1];
            expectedByDate.set(date, (expectedByDate.get(date) || 0) + 1);
          }

          if (expectedByDate.size === 0) {
            fail('Could not derive expected report dates from artifacts');
          }

          for (const [date, expectedCount] of expectedByDate.entries()) {
            const dateDir = path.join(outputDir, 'accessibility-reports', date);
            const actualCount = walkFiles(dateDir).filter(isViolationReport).length;
            const reportListCountForDate = reportList.filter((entry) => {
              if (typeof entry !== 'string') {
                return false;
              }

              const normalizedEntry = entry.startsWith('/') ? entry.slice(1) : entry;
              return normalizedEntry.includes(`accessibility-reports/${date}/`) && normalizedEntry.includes('violations-') && normalizedEntry.endsWith('.json');
            }).length;

            if (actualCount < expectedCount) {
              fail(`Expected at least ${expectedCount} reports for ${date} in site-output, found ${actualCount}`);
            }

            if (reportListCountForDate < expectedCount) {
              fail(`Expected at least ${expectedCount} report-list entries for ${date}, found ${reportListCountForDate}`);
            }
          }

          console.log(`✅ Sanity gate passed: report-list entries=${reportList.length}, artifact reports=${artifactReports.length}, dates checked=${expectedByDate.size}`);
          NODE

      - name: Create or Update GitHub Issues
        uses: actions/github-script@v9
        timeout-minutes: 12
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const updateIssues = require('./js/update-issues-from-site.js');
            await updateIssues({
              github,
              context,
              core,
              siteDir: 'site-output',
              siteBaseUrl: 'https://turbolego.github.io/uustreak'
            })

      - name: Publish incrementally to gh-pages branch
        run: |
          set -euo pipefail
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          CURRENT_DATE=$(date +%Y-%m-%d)
          PUBLISH_DIR="${RUNNER_TEMP:-/tmp}/gh-pages-publish-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT:-1}"
          rm -rf "$PUBLISH_DIR"

          cleanup_publish_worktree() {
            if [ -n "${PUBLISH_DIR:-}" ] && [ -d "$PUBLISH_DIR" ]; then
              if git worktree list --porcelain | grep -Fq "worktree $PUBLISH_DIR"; then
                git worktree remove --force "$PUBLISH_DIR" || true
              fi
              rm -rf "$PUBLISH_DIR" || true
            fi
            git worktree prune || true
          }
          trap cleanup_publish_worktree EXIT

          # Blobless fetch: only tree objects are downloaded; historical violation file
          # blobs are never fetched because we do not access those paths.
          git fetch --no-tags --depth=1 --filter=blob:none origin gh-pages || true

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add "$PUBLISH_DIR" origin/gh-pages
          else
            git worktree add --detach "$PUBLISH_DIR"
            git -C "$PUBLISH_DIR" checkout --orphan gh-pages
            git -C "$PUBLISH_DIR" rm -rf . 2>/dev/null || true
          fi

          if [ ! -d "site-output" ]; then
            echo "❌ site-output directory NOT FOUND in $(pwd)"
            ls -la
            exit 1
          fi
          echo "✓ site-output: $(du -sh site-output 2>/dev/null | cut -f1)"

          # ── 1. Static site files (HTML, CSS, JS, assets) ────────────────────
          echo "Syncing static site files..."
          find site-output -maxdepth 1 -type f \( \
            -name "*.html" -o -name "*.ico" -o -name "site.webmanifest" \
            -o -name "styles.css" -o -name "projects.json" -o -name "results.json" \
            -o -name "test-results.json" -o -name "README.md" \
          \) -exec cp -f {} "$PUBLISH_DIR/" \;
          for dir in assets js; do
            if [ -d "site-output/$dir" ]; then
              rm -rf "$PUBLISH_DIR/$dir"
              cp -R "site-output/$dir" "$PUBLISH_DIR/$dir"
            fi
          done

          # ── 2. Today's violation reports ─────────────────────────────────────
          echo "Syncing today's violation reports ($CURRENT_DATE)..."
          if [ -d "site-output/accessibility-reports/$CURRENT_DATE" ]; then
            rm -rf "$PUBLISH_DIR/accessibility-reports/$CURRENT_DATE"
            mkdir -p "$PUBLISH_DIR/accessibility-reports"
            cp -R "site-output/accessibility-reports/$CURRENT_DATE" \
              "$PUBLISH_DIR/accessibility-reports/$CURRENT_DATE"
          fi

          # ── 3. Updated metadata index files ──────────────────────────────────
          echo "Syncing index files..."
          mkdir -p "$PUBLISH_DIR/historical-data"
          mkdir -p "$PUBLISH_DIR/accessibility-reports/archives"
          for f in \
            "historical-data/report-list.json" \
            "historical-data/streak-index.json"; do
            [ -f "site-output/$f" ] && cp "site-output/$f" "$PUBLISH_DIR/$f"
          done
          [ -f "site-output/accessibility-reports/archives/archive_index.json" ] && \
            cp "site-output/accessibility-reports/archives/archive_index.json" \
               "$PUBLISH_DIR/accessibility-reports/archives/"

          # ── 4. Today's archive ────────────────────────────────────────────────
          echo "Syncing today's archive..."
          ARCHIVE_SRC="site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz"
          [ -f "$ARCHIVE_SRC" ] && \
            cp "$ARCHIVE_SRC" "$PUBLISH_DIR/accessibility-reports/archives/"

          # ── 5. Today's daily summary ──────────────────────────────────────────
          echo "Syncing today's summary..."
          SUMMARY_SRC="site-output/accessibility-reports/summaries/$CURRENT_DATE"
          if [ -d "$SUMMARY_SRC" ]; then
            rm -rf "$PUBLISH_DIR/accessibility-reports/summaries/$CURRENT_DATE"
            mkdir -p "$PUBLISH_DIR/accessibility-reports/summaries"
            cp -R "$SUMMARY_SRC" \
              "$PUBLISH_DIR/accessibility-reports/summaries/$CURRENT_DATE"
          fi

          # ── 6. Playwright reports for today ───────────────────────────────────
          echo "Syncing playwright reports..."
          PW_SRC="site-output/playwright-reports/$CURRENT_DATE"
          if [ -d "$PW_SRC" ]; then
            rm -rf "$PUBLISH_DIR/playwright-reports/$CURRENT_DATE"
            mkdir -p "$PUBLISH_DIR/playwright-reports"
            cp -R "$PW_SRC" "$PUBLISH_DIR/playwright-reports/$CURRENT_DATE"
          fi
          # Merge today's playwright index entries into the existing gh-pages index
          # (preserves historical entries rather than replacing with today-only)
          if [ -f "site-output/playwright-reports/index.json" ]; then
            mkdir -p "$PUBLISH_DIR/playwright-reports"
            if [ -f "$PUBLISH_DIR/playwright-reports/index.json" ]; then
              node -e "
                const a = JSON.parse(require('fs').readFileSync('$PUBLISH_DIR/playwright-reports/index.json','utf8'));
                const b = JSON.parse(require('fs').readFileSync('site-output/playwright-reports/index.json','utf8'));
                const merged = [...new Set([...a,...b])].sort();
                require('fs').writeFileSync('$PUBLISH_DIR/playwright-reports/index.json', JSON.stringify(merged));
              " 2>/dev/null || \
                cp "site-output/playwright-reports/index.json" \
                   "$PUBLISH_DIR/playwright-reports/index.json"
            else
              cp "site-output/playwright-reports/index.json" \
                 "$PUBLISH_DIR/playwright-reports/index.json"
            fi
          fi

          # ── 7. Issues markdown (always fully regenerated) ─────────────────────
          echo "Syncing issues-markdown..."
          if [ -d "site-output/issues-markdown" ]; then
            mkdir -p "$PUBLISH_DIR/issues-markdown"
            rsync -a --delete \
              "site-output/issues-markdown/" "$PUBLISH_DIR/issues-markdown/"
          fi

          # ── 8. Invalid-URLs index ─────────────────────────────────────────────
          echo "Syncing invalid-urls..."
          if [ -d "site-output/historical-data/invalid-urls" ]; then
            mkdir -p "$PUBLISH_DIR/historical-data/invalid-urls"
            rsync -a \
              "site-output/historical-data/invalid-urls/" \
              "$PUBLISH_DIR/historical-data/invalid-urls/"
          fi

          # Sanity checks before committing
          touch "$PUBLISH_DIR/.nojekyll"
          if [ ! -f "$PUBLISH_DIR/index.html" ]; then
            echo "❌ index.html not found after incremental copy"
            exit 1
          fi
          if [ ! -f "$PUBLISH_DIR/historical-data/report-list.json" ]; then
            echo "❌ report-list.json missing from publish root"
            exit 1
          fi
          echo "✓ Incremental copy complete"

          if [ -n "$(git -C "$PUBLISH_DIR" status --porcelain)" ]; then
            git -C "$PUBLISH_DIR" add -A
            git -C "$PUBLISH_DIR" commit -m "Deploy site for ${GITHUB_SHA}"
            PUSH_OK=false
            for attempt in 1 2 3; do
              echo "Push attempt $attempt..."
              git fetch --no-tags --depth=1 --filter=blob:none origin gh-pages || true
              if git -C "$PUBLISH_DIR" push origin HEAD:gh-pages --force-with-lease; then
                PUSH_OK=true
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push failed due to remote updates, retrying..."
                sleep 2
              fi
            done

            if [ "$PUSH_OK" != "true" ]; then
              echo "❌ Failed to publish gh-pages after retries"
              exit 1
            fi

            echo "✅ Published updated site to gh-pages"
          else
            echo "No changes to publish"
          fi

          git worktree prune || true

      - name: Cleanup runner workspace after deploy
        if: always()
        run: |
          echo "=== Cleaning up runner workspace after deploy ==="
          echo "Disk usage before cleanup:"
          df -h . || true
          rm -rf gh-pages-sparse gh-pages-publish site-output artifacts merged-summaries invalid-urls-artifacts 2>/dev/null || true
          rm -rf ~/.npm ~/.cache/npm /tmp/npm-cache-* /tmp/npm-prefix-* 2>/dev/null || true
          rm -rf node_modules venv "${RUNNER_TEMP:-/tmp}/ms-playwright-*" 2>/dev/null || true
          echo "Disk usage after cleanup:"
          df -h . || true

  workflow-failure-notification:
    needs: [setup, wcag-test, merge-summaries, check-job-status]
    runs-on: self-hosted
    if: always() && needs.check-job-status.outputs.all_jobs_successful == 'false' && needs.check-job-status.outputs.should_retry == 'false'
    steps:
      - name: Ensure Git Bash is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitBin = "C:\Program Files\Git\bin"
          $gitUsrBin = "C:\Program Files\Git\usr\bin"
          if (Test-Path $gitBin) {
            Add-Content $env:GITHUB_PATH $gitBin
            Write-Host "Added to PATH: $gitBin"
          }
          if (Test-Path $gitUsrBin) {
            Add-Content $env:GITHUB_PATH $gitUsrBin
            Write-Host "Added to PATH: $gitUsrBin"
          }

      - name: Notify workflow failure
        run: |
          echo "🚨 WORKFLOW FAILED AFTER MAXIMUM RETRIES"
          echo "The WCAG accessibility testing workflow has failed after 3 attempts."
          echo "Manual intervention may be required."
          echo ""
          echo "Failed jobs:"
          echo "  Setup: ${{ needs.setup.result }}"
          echo "  WCAG Test: ${{ needs.wcag-test.result }}"
          echo "  Merge Summaries: ${{ needs.merge-summaries.result }}"
          
          # Exit with error to mark workflow as failed
          exit 1
