name: WCAG Accessibility Testing (GitHub runner) - Sunday
on:
  schedule:
    - cron: '0 0 * * 0'          # every sunday at 00:00 UTC
  workflow_dispatch:            # manual run always allowed

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
  issues: write

jobs:
  # ──────────────────────────────────────────────────────────
  # Setup job (no gate-keeper needed for daily runs)
  # ──────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Playwright browser directory
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install dependencies and Playwright browsers
        run: |
          npm ci
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/ms-playwright"
          mkdir -p "$PLAYWRIGHT_BROWSERS_PATH"

          install_playwright_browsers() {
            npx playwright install chromium firefox webkit --with-deps
          }

          BROWSER_INSTALL_SUCCESS=false
          for attempt in 1 2 3; do
            echo "Playwright browser installation attempt $attempt..."
            if install_playwright_browsers; then
              echo "Playwright browsers installed successfully on attempt $attempt"
              BROWSER_INSTALL_SUCCESS=true
              break
            fi

            echo "Playwright browser installation attempt $attempt failed"
            echo "Current browser cache contents:"
            ls -la "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null || true
            if [ $attempt -lt 3 ]; then
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          if [ "$BROWSER_INSTALL_SUCCESS" = false ]; then
            echo "All Playwright browser installation attempts failed"
            exit 1
          fi
      - name: Generate test distribution
        id: set-matrix
        run: |
          SPECS=(tests/*.spec.ts)
          TOTAL_SPECS=${#SPECS[@]}
          BATCH_SIZE=$(( TOTAL_SPECS / 2 ))
          if [ "$BATCH_SIZE" -lt 1 ]; then
            BATCH_SIZE=1
          fi
          BATCH_COUNT=2
          BATCHES=$(seq -s ',' 0 $((BATCH_COUNT - 1)) | jq -R 'split(",")' | jq -c '{batch: .}')
          echo "matrix=$BATCHES" >> $GITHUB_OUTPUT
          echo "Total specs: $TOTAL_SPECS"
          echo "Batch size: $BATCH_SIZE"
          echo "Batch count: $BATCH_COUNT"

  wcag-test:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
      max-parallel: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Playwright browser directory
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Node.js dependencies
        run: npm ci
      - name: Install Playwright browsers with dependencies
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/ms-playwright"
          mkdir -p "$PLAYWRIGHT_BROWSERS_PATH"

          install_playwright_browsers() {
            npx playwright install chromium firefox webkit --with-deps
          }

          BROWSER_INSTALL_SUCCESS=false
          for attempt in 1 2 3; do
            echo "Playwright browser installation attempt $attempt for batch ${{ matrix.batch }}..."
            if install_playwright_browsers; then
              echo "Playwright browsers installed successfully on attempt $attempt"
              BROWSER_INSTALL_SUCCESS=true
              break
            fi

            echo "Playwright browser installation attempt $attempt failed"
            echo "Current browser cache contents:"
            ls -la "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null || true
            if [ $attempt -lt 3 ]; then
              echo "Waiting 10 seconds before retry..."
              sleep 10
            fi
          done

          if [ "$BROWSER_INSTALL_SUCCESS" = false ]; then
            echo "All Playwright browser installation attempts failed"
            exit 1
          fi
      - name: Ensure Python and venv are available
        run: |
          # Check if python3 and venv are available
          if ! python3 -m venv --help >/dev/null 2>&1; then
            echo "Warning: Python venv module not available. Installing python3-venv..."
            sudo apt-get update && sudo apt-get install -y python3-venv
          else
            echo "Python venv module is available"
          fi
      - name: Set up Python virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install beautifulsoup4 requests
      - name: Verify projects.json exists
        run: |
          # Verify that projects.json exists
          if [ ! -f "projects.json" ]; then
            echo "Error: projects.json file not found!"
            exit 1
          fi
          echo "Found projects.json with $(jq length projects.json) projects"
          # Copy any invalid_urls files to artifacts for later use
          if [ -d "historical-data/invalid-urls" ]; then
            mkdir -p invalid-urls-artifacts
            cp historical-data/invalid-urls/invalid_urls_*.json invalid-urls-artifacts/ 2>/dev/null || echo "No invalid URLs files found"
          fi
      - name: Generate spec files
        run: |
          source venv/bin/activate
          python3 generate_specs.py
          # Copy tag-summary.js and validation script to tests directory
          cp js/tag-summary.js tests/
          cp js/validate-summaries.js tests/
          cp js/merge-summary-parts.js tests/
      - name: Upload invalid URLs files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: invalid-urls-files
          path: invalid-urls-artifacts/
          retention-days: 30
          if-no-files-found: ignore
      - name: Run WCAG Accessibility Tests for batch
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          BATCH_INDEX: ${{ matrix.batch }}
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/ms-playwright"
          export BATCH_INDEX=${{ matrix.batch }}
          mapfile -t ALL_SPECS < <(ls tests/*.spec.ts)
          TOTAL_SPECS=${#ALL_SPECS[@]}
          BATCH_SIZE=$(( TOTAL_SPECS / 2 ))
          if [ "$BATCH_SIZE" -lt 1 ]; then
            BATCH_SIZE=1
          fi
          START_INDEX=$((${{ matrix.batch }} * $BATCH_SIZE))
          for ((i = START_INDEX; i < START_INDEX + BATCH_SIZE && i < ${#ALL_SPECS[@]}; i++)); do
            if [ -f "${ALL_SPECS[$i]}" ]; then
              SPEC_FILE="${ALL_SPECS[$i]}"
              PROJECT_NAME=$(basename "$SPEC_FILE" .spec.ts | tr '_' ' ')
              echo "Running Playwright tests for '$PROJECT_NAME' ($SPEC_FILE)"
              npx playwright test "$SPEC_FILE" || echo "Test completed with violations for $PROJECT_NAME"
            fi
          done
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-batch-${{ matrix.batch }}
          path: |
            accessibility-reports/
            playwright-report/
          retention-days: 30

  merge-summaries:
    needs: wcag-test
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          
      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: test-results-batch-*
          merge-multiple: true
          
      - name: Merge Summary Parts
        run: |
          echo "Merging summary part files..."
          
          # Get today's date
          TODAY=$(date +%Y-%m-%d)
          echo "Merging summaries for date: $TODAY"
          
          # Create target directory structure
          mkdir -p "accessibility-reports/summaries/$TODAY"
          
          # Copy all part files from artifacts
          find artifacts -name "daily_summary_part_*.json" -exec cp {} "accessibility-reports/summaries/$TODAY/" \;
          
          # List found part files
          echo "Found part files:"
          ls -la "accessibility-reports/summaries/$TODAY/daily_summary_part_"*.json 2>/dev/null || echo "No part files found"
          
          PARTS_COUNT=$(find artifacts -name "daily_summary_part_*.json" | wc -l)
          echo "Found $PARTS_COUNT summary parts to merge"

          if [ "$PARTS_COUNT" -gt 0 ]; then
            node js/merge-summary-parts.js "$TODAY" "$PARTS_COUNT"
          else
            echo "No summary parts found to merge"
            exit 1
          fi
          
          # Verify the merged file
          if [ -f "accessibility-reports/summaries/$TODAY/daily_summary.json" ]; then
            echo "✓ Successfully created merged summary file"
            echo "File size: $(wc -c < "accessibility-reports/summaries/$TODAY/daily_summary.json") bytes"
            
            # Show summary stats
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('accessibility-reports/summaries/$TODAY/daily_summary.json', 'utf8'));
              console.log('Summary stats:');
              console.log('- Tags:', data.tags?.length || 0);
              console.log('- Rule IDs:', data.rule_ids?.length || 0);
              const totalUrls = [...(data.tags || []), ...(data.rule_ids || [])].reduce((sum, item) => sum + (item.urls?.length || 0), 0);
              console.log('- Total URL references:', totalUrls);
            "
          else
            echo "✗ Failed to create merged summary file"
            exit 1
          fi
          
      - name: Upload Merged Summary
        uses: actions/upload-artifact@v7
        with:
          name: merged-summary-${{ github.run_id }}
          path: accessibility-reports/summaries/
          retention-days: 30

  deploy:
    needs: [wcag-test, merge-summaries]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Checkout published site snapshot
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages-fallback
          fetch-depth: 1
        continue-on-error: true
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: test-results-batch-*
          merge-multiple: true
      - name: Download merged summary artifacts
        uses: actions/download-artifact@v8
        with:
          name: merged-summary-${{ github.run_id }}
          path: merged-summaries
      - name: Download invalid URLs files
        uses: actions/download-artifact@v8
        with:
          name: invalid-urls-files
          path: invalid-urls-artifacts
        continue-on-error: true
      - name: Backfill missing legacy seed data
        run: |
          mkdir -p pages-seed
          cp -R gh-pages-fallback/* pages-seed/ 2>/dev/null || true
          if [ ! -f "pages-seed/playwright-reports/index.json" ] && [ -d "gh-pages-fallback/playwright-reports" ]; then
            cp -R gh-pages-fallback/playwright-reports pages-seed/
          fi
          if [ ! -f "pages-seed/historical-data/invalid-urls/index.json" ] && [ -d "gh-pages-fallback/historical-data/invalid-urls" ]; then
            mkdir -p pages-seed/historical-data
            cp -R gh-pages-fallback/historical-data/invalid-urls pages-seed/historical-data/
          fi
          if [ ! -f "pages-seed/issues-markdown/index.json" ] && [ -d "gh-pages-fallback/issues-markdown" ]; then
            cp -R gh-pages-fallback/issues-markdown pages-seed/
          fi
      - name: Build Pages site from artifacts
        run: |
          node js/build-pages-site.js
        env:
          SOURCE_DIR: ${{ github.workspace }}
          GH_PAGES_SEED_DIR: ${{ github.workspace }}/pages-seed
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          MERGED_SUMMARY_DIR: ${{ github.workspace }}/merged-summaries
          INVALID_URLS_DIR: ${{ github.workspace }}/invalid-urls-artifacts
          PAGES_OUTPUT_DIR: ${{ github.workspace }}/site-output
      - name: Validate and Repair Summary Files
        run: |
          echo "Validating and repairing summary files..."
          if command -v node >/dev/null 2>&1; then
            if [ ! -f "js/validate-summaries.js" ]; then
              echo "Error: js/validate-summaries.js not found"
              exit 1
            fi

            cd site-output
            node ../js/validate-summaries.js

            echo "Summary validation completed"
          else
            echo "Node.js not available, skipping validation"
          fi
      - name: Verify built site contents
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          echo "=== Final verification before deployment ==="
          find site-output/accessibility-reports -maxdepth 1 -type d -name "[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]" | sort || true
          if [ -f "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" ]; then
            tar -tzf "site-output/accessibility-reports/archives/reports_${CURRENT_DATE}.tar.gz" > /dev/null
            echo "Verified reports_${CURRENT_DATE}.tar.gz"
          else
            echo "Today's archive is not present; continuing because some runs produce placeholder-only data."
          fi
          echo "Archive count: $(find site-output/accessibility-reports/archives -name 'reports_*.tar.gz' | wc -l)"
      - name: Create or Update GitHub Issues
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const updateIssues = require('./js/update-issues-from-site.js');
            await updateIssues({
              github,
              context,
              core,
              siteDir: 'site-output',
              siteBaseUrl: 'https://turbolego.github.io/uustreak'
            });
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-output
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4